<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grab-It — Free Media Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1eb;--fg:#3a3a38;--accent:#e85d2a;--accent-hover:#d04e1f;--muted:#9c9889;--card:#fff;--card-border:#e2ded6;--success:#2d8a4e;--error:#c43d3d;--radius:14px;--shimmer:linear-gradient(90deg,#ebe8e2 25%,#f0ede7 50%,#ebe8e2 75%);}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}body::after{content:'';position:fixed;inset:0;opacity:.03;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:128px}.page{max-width:620px;margin:0 auto;padding:60px 24px 80px}.brand{margin-bottom:48px}.brand h1{font-family:'Instrument Serif',serif;font-size:4.2rem;font-weight:400;letter-spacing:-.03em;line-height:1;color:var(--fg)}.brand h1 em{font-style:italic;color:var(--accent)}.brand p{margin-top:10px;font-size:.78rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}textarea{width:100%;padding:18px 20px;border:1.5px solid var(--card-border);border-radius:var(--radius);background:var(--card);color:var(--fg);font-family:'DM Mono',monospace;font-size:.88rem;outline:none;resize:none;min-height:56px;transition:border-color .25s,box-shadow .25s;margin-bottom:6px}textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,93,42,.08)}textarea::placeholder{color:var(--muted)}.hint{font-size:.7rem;color:var(--muted);margin-bottom:20px;letter-spacing:.02em}.controls{display:flex;gap:10px;margin-bottom:6px;align-items:center}.pill-group{display:flex;border:1.5px solid var(--card-border);border-radius:10px;overflow:hidden;background:var(--card)}.pill{padding:9px 15px;font-family:'DM Mono',monospace;font-size:.76rem;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:.03em;text-transform:uppercase}.pill.active{background:var(--fg);color:var(--bg)}.pill:not(.active):hover{color:var(--fg)}.fetch-btn{flex:1;padding:10px 20px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.04em;text-transform:uppercase}.fetch-btn:hover{background:var(--accent-hover)}.fetch-btn:active{transform:scale(.98)}.fetch-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}.cards{margin-top:24px}.card{display:flex;gap:14px;border:1.5px solid var(--card-border);border-radius:var(--radius);background:var(--card);padding:14px;margin-bottom:10px;animation:slideUp .4s cubic-bezier(.16,1,.3,1)}@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.card-thumb{width:120px;min-width:120px;height:80px;border-radius:8px;overflow:hidden;background:var(--card-border);flex-shrink:0}.card-thumb img{width:100%;height:100%;object-fit:cover;display:block}.card-thumb.loading{background:var(--shimmer);background-size:200% 100%;animation:shimmer 1.5s infinite}.no-thumb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted)}.no-thumb svg{width:28px;height:28px;opacity:.5}.skeleton-line{height:12px;border-radius:4px;background:var(--shimmer);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:6px}.skeleton-line.short{width:40%;height:10px}.skeleton-line.medium{width:75%}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}.card-title{font-family:'Instrument Serif',serif;font-size:1rem;line-height:1.3;color:var(--fg);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.card-meta{font-size:.68rem;color:var(--muted);letter-spacing:.03em;text-transform:uppercase;margin-bottom:8px}.card-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.card-dl-btn{padding:6px 14px;border:none;border-radius:7px;background:var(--fg);color:var(--bg);font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.03em;text-transform:uppercase}.card-dl-btn:hover{background:#2d2d2a}.card-dl-btn:disabled{opacity:.4;cursor:not-allowed}.card-dl-btn.done{background:var(--success);color:#fff}.card-dl-btn.err{background:var(--error);color:#fff}.card-status{font-size:.68rem;color:var(--muted)}.card-status.downloading{color:var(--accent)}.card-status.done{color:var(--success)}.card-status.err{color:var(--error)}.q-chip{padding:4px 10px;border:1.5px solid var(--card-border);border-radius:6px;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .2s}.q-chip.active{border-color:var(--fg);color:var(--fg);background:rgba(26,26,24,.04)}.q-chip:hover:not(.active){border-color:var(--muted)}.card.card-error{border-color:rgba(196,61,61,.2);background:rgba(196,61,61,.03)}.card-error-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(196,61,61,.08);color:var(--error)}.card-error-icon svg{width:24px;height:24px}.card-error-msg{font-size:.72rem;color:var(--error);margin-top:2px;line-height:1.4}.card-error-url{font-size:.65rem;color:var(--muted);word-break:break-all;margin-top:4px}.progress-wrap{width:100%;height:3px;background:var(--card-border);border-radius:2px;margin-top:6px;overflow:hidden}.progress-bar{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .15s linear}.dl-all-bar{display:flex;gap:10px;margin-top:16px}.dl-all-btn{flex:1;padding:12px;border:none;border-radius:10px;background:var(--fg);color:var(--bg);font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.04em;text-transform:uppercase}.dl-all-btn:hover{background:#2d2d2a}.dl-all-btn:disabled{opacity:.4;cursor:not-allowed}.spin{display:inline-block;width:10px;height:10px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}@keyframes spin{to{transform:rotate(360deg)}}.footer{margin-top:48px;text-align:center;font-size:.68rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;line-height:1.8}@media (max-width:500px){.brand h1{font-size:3rem}.page{padding:40px 16px 60px}.card{flex-direction:column;gap:10px}.card-thumb{width:100%;min-width:unset;height:160px}.card-title{white-space:normal}.controls{flex-wrap:wrap}.fetch-btn{width:100%}.pill{padding:9px 11px;font-size:.7rem}}
</style>
</head>
<body>
<div class="page">
  <div class="brand"><h1>Grab-<em>It</em></h1><p>Free media downloader</p></div>
  <textarea id="urls" placeholder="Paste one or more URLs..." rows="2"></textarea>
  <p class="hint">Multiple links? Separate with spaces, commas, or newlines.</p>
  <div class="controls">
    <div class="pill-group">
      <button class="pill active" data-format="mp4" onclick="setFormat(this)">MP4</button>
      <button class="pill" data-format="mp3" onclick="setFormat(this)">MP3</button>
      <button class="pill" data-format="wav" onclick="setFormat(this)">WAV</button>
    </div>
    <button class="fetch-btn" id="goBtn" onclick="go()">Fetch</button>
  </div>
  <div id="cards" class="cards"></div>
  <div class="footer">YouTube · TikTok · Instagram · Twitter/X · Reddit · Facebook<br>Vimeo · Twitch · Dailymotion · SoundCloud · Loom · Streamable<br>Pinterest · Tumblr · Threads · LinkedIn · 1000+ more</div>
</div>
<script>
let currentFormat='mp4';let cardData=[];const API_ENDPOINT='/download';function setFormat(btn){document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFormat=btn.dataset.format;document.querySelectorAll('.card').forEach((el,idx)=>{if(cardData[idx]?.status==='ready')renderCard(idx);});}function parseUrls(text){return[...new Set(text.split(/[\s,
]+/).map(u=>u.trim()).filter(u=>/^https?:\/\//.test(u)))];}function fmtDur(s){if(s===null||s===undefined)return'';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');return m+':'+String(sec).padStart(2,'0');}function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}function friendlyError(err){if(!err)return'Unknown error';const e=String(err);if(e.includes('Unsupported'))return'This URL is not supported';if(e.includes('unavailable')||e.includes('Unavailable'))return'Video is unavailable or removed';if(e.includes('private')||e.includes('Private'))return'This video is private';if(e.includes('403'))return'Access denied by the platform';if(e.includes('404'))return'Video not found';if(e.includes('copyright')||e.includes('blocked'))return'Blocked by the platform';if(e.includes('geo')||e.includes('region'))return'Not available in your region';if(e.includes('timed out')||e.includes('Timed'))return'Request timed out — try again';return e.length>100?e.slice(0,100)+'…':e;}function delay(ms){return new Promise(r=>setTimeout(r,ms));}document.getElementById('urls').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});async function go(){const urls=parseUrls(document.getElementById('urls').value);if(!urls.length)return;const btn=document.getElementById('goBtn');const container=document.getElementById('cards');btn.disabled=true;btn.textContent='Loading…';container.innerHTML='';cardData=[];for(let i=0;i<urls.length;i++){cardData.push({url:urls[i],status:'loading'});renderCard(i);await delay(150);try{const data=await fetchInfo(urls[i]);cardData[i]={...cardData[i],status:'ready',title:data.title||'Untitled',thumbnail:data.thumbnail||'',duration:data.duration||0,uploader:data.uploader||'',formats:data.formats||[],selectedFormatId:data.formats?.[0]?.id||null};}catch(err){cardData[i]={...cardData[i],status:'info-error',error:err?.message||String(err)};}renderCard(i);}if(cardData.filter(c=>c.status==='ready').length>1)renderDownloadAll();btn.disabled=false;btn.textContent='Fetch';}async function fetchInfo(url){const res=await fetch(API_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,action:'info'})});let data;try{data=await res.json();}catch{data=null;}if(!res.ok)throw new Error(data?.error||data?.message||`Request failed (${res.status})`);return data;}async function downloadFile(url,format,quality){const res=await fetch(API_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,format,quality:quality||'',action:'download'})});if(!res.ok){let msg=`Request failed (${res.status})`;try{const data=await res.json();msg=data?.error||data?.message||msg;}catch{}throw new Error(msg);}const blob=await res.blob();let filename='download.'+format;const cd=res.headers.get('content-disposition')||'';const m=cd.match(/filename\*?=(?:UTF-8''|")?([^";]+)"?/i);if(m?.[1])filename=decodeURIComponent(m[1].replace(/"/g,''));return{blob,filename};}function renderCard(idx){const c=cardData[idx];let el=document.getElementById('card-'+idx);if(!el){el=document.createElement('div');el.id='card-'+idx;el.className='card';document.getElementById('cards').appendChild(el);}if(c.status==='loading'){el.className='card';el.innerHTML='<div class="card-thumb loading"></div><div class="card-body"><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>';return;}if(c.status==='info-error'){el.className='card card-error';el.innerHTML='<div class="card-thumb"><div class="card-error-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div></div>'+'<div class="card-body"><div class="card-title" style="color:var(--error)">Could not fetch</div><div class="card-error-msg">'+esc(friendlyError(c.error||''))+'</div><div class="card-error-url">'+esc(c.url)+'</div></div>';return;}el.className='card';const isAudio=currentFormat==='mp3'||currentFormat==='wav';let thumbHtml;if(isAudio){thumbHtml='<div class="no-thumb" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';}else if(c.thumbnail){thumbHtml='<img src="'+esc(c.thumbnail)+'" alt="" loading="lazy">';}else{thumbHtml='<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>';}let chips='';if(currentFormat==='mp4'&&c.formats&&c.formats.length>1){chips=c.formats.map(f=>'<button class="q-chip'+(f.id===c.selectedFormatId?' active':'')+'" onclick="pickFormat('+idx+',''+f.id+'')">'+esc(f.label)+'</button>').join('');}let action='';if(c.status==='ready'){action='<button class="card-dl-btn" onclick="dlCard('+idx+')">Download</button>'+chips;}else if(c.status==='downloading'){const pct=c.progress||0;action='<div style="flex:1;min-width:0">'+'<span class="card-status downloading" id="pct-'+idx+'"><span class="spin"></span> '+pct+'%</span>'+'<div class="progress-wrap"><div class="progress-bar" id="prog-'+idx+'" style="width:'+pct+'%"></div></div>'+'</div>';}else if(c.status==='done'){action='<button class="card-dl-btn done" onclick="saveCard('+idx+')">Save again</button><span class="card-status done">&#10003; '+esc(c.filename||'')+'</span>';}else if(c.status==='error'){action='<button class="card-dl-btn err" onclick="dlCard('+idx+')">Retry</button><span class="card-status err">'+esc(friendlyError(c.error||'Download failed'))+'</span>';}el.innerHTML='<div class="card-thumb">'+thumbHtml+'</div>'+'<div class="card-body">'+'<div class="card-title">'+esc(c.title||'Untitled')+'</div>'+'<div class="card-meta">'+esc(c.uploader)+(c.duration?' · '+fmtDur(c.duration):'')+'</div>'+'<div class="card-actions">'+action+'</div>'+'</div>';}function renderDownloadAll(){const ex=document.getElementById('dl-all-bar');if(ex)ex.remove();const bar=document.createElement('div');bar.id='dl-all-bar';bar.className='dl-all-bar';bar.innerHTML='<button class="dl-all-btn" onclick="dlAll()">Download All</button>';document.getElementById('cards').appendChild(bar);}function pickFormat(idx,id){cardData[idx].selectedFormatId=id;renderCard(idx);}async function dlCard(idx){const c=cardData[idx];c.status='downloading';c.error=null;c.progress=0;renderCard(idx);const quality=c.formats?.find(f=>f.id===c.selectedFormatId)?.label||'';const steps=20;for(let s=1;s<=steps;s++){await delay(40);c.progress=Math.round(s/steps*100);const bar=document.getElementById('prog-'+idx);const pct=document.getElementById('pct-'+idx);if(bar)bar.style.width=c.progress+'%';if(pct)pct.innerHTML='<span class="spin"></span> '+c.progress+'%';}try{const {blob,filename}=await downloadFile(c.url,currentFormat,quality);c.status='done';c.filename=filename;c._blob=blob;renderCard(idx);triggerDownload(blob,filename);}catch(err){c.status='error';c.error=err?.message||String(err);renderCard(idx);}}function triggerDownload(blob,filename){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),2000);}function saveCard(idx){const c=cardData[idx];if(c._blob&&c.filename)triggerDownload(c._blob,c.filename);}async function dlAll(){const btn=document.querySelector('.dl-all-btn');if(btn){btn.disabled=true;btn.textContent='Downloading…';}for(let i=0;i<cardData.length;i++){if(cardData[i].status==='ready')await dlCard(i);}if(btn){btn.disabled=false;btn.textContent='Download All';}}
</script>
</body>
</html>
